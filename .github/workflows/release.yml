name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: svn-fucker.exe
            archive: svn-fucker-windows-amd64.zip
          - goos: linux
            goarch: amd64
            binary: svn-fucker
            archive: svn-fucker-linux-amd64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.binary }}" .

      - name: Package
        working-directory: dist
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${{ matrix.archive }}" "${{ matrix.binary }}"
          else
            tar -czf "${{ matrix.archive }}" "${{ matrix.binary }}"
          fi
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/svn-fucker-linux-amd64.tar.gz
            dist/svn-fucker-windows-amd64.zip
            dist/checksums.txt
